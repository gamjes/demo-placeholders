<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

img,
video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.message {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 2rem;
}
</style>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);

const img = params.get("img");
const video = params.get("video");

if (img) {
    document.body.innerHTML = `
        <img src="images/${img}" alt="">
    `;
} else if (video) {
    document.body.innerHTML = `
        <video
            src="videos/${video}"
            autoplay
            muted
            loop
            controls
            playsinline>
        </video>
    `;
} else {
    document.body.innerHTML = `
        <div class="message">Coming Soon</div>
    `;
}
</script>

</body>
</html>
