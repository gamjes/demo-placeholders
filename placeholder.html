<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

img, video {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);

const img = params.get('img');
const video = params.get('video');

if (img) {
    document.body.innerHTML =
        <img src="images/${img}">;
}
else if (video) {
    document.body.innerHTML =
        <video autoplay muted loop controls>
            <source src="videos/${video}" type="video/mp4">
        </video>;
}
else {
    document.body.innerHTML =
        '<div style="color:white;display:flex;justify-content:center;align-items:center;height:100%;">Coming Soon</div>';
}
</script>

</body>
</html>
