<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placeholder</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        img, video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .message {
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            font-size: 2rem;
        }
    </style>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);

console.log("search =", window.location.search);

const img = params.get("img");
const video = params.get("video");

console.log("img =", img);
console.log("video =", video);

document.body.innerHTML = `
    <div style="color:white;font:20px Arial;padding:20px;">
        img = ${img}<br>
        video = ${video}
    </div>
`;
</script>

</body>
</html>
